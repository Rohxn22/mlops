on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

name: MLOps Pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # Step 1: Pull the latest code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up AWS credentials so we can access S3 and EC2
    # These values are stored as GitHub Secrets — never hardcoded
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 3: Install DVC and pull the dataset from S3
    # DVC tracks dataset versions — ensures we always train on the right data
    - name: Pull dataset from S3 via DVC
      run: |
        pip install "dvc[s3]"
        dvc pull prediction_model/datasets/loan_data_part_1.csv.dvc --force

    # Step 4: Log in to Docker Hub so we can push the built image
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Step 5: Build the Docker image
    # Inside the build: model trains, tests run (see Dockerfile)
    # If training or tests fail, this step fails and nothing gets deployed
    - name: Build and push Docker image
      run: |
        docker build \
          --build-arg AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          --build-arg AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest

    # Step 6: SSH into the EC2 server and deploy the new image
    # Stops the old container, pulls the new image, starts fresh
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 30m
        script: |
          docker stop mlops-app || true
          docker rm mlops-app || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest
          docker image prune -a -f
          docker run -d \
            --name mlops-app \
            --restart always \
            -p 8005:8005 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest