on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

name: MLOps Pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Python for DVC
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install DVC and pull data
      run: |
        pip install "dvc[s3]"
        dvc pull prediction_model/datasets/loan_data_part_2.csv.dvc --force

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push image to Docker Hub
      run: |
        docker build \
          --build-arg AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          --build-arg AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 30m
        script: |
          docker stop mlops-app || true
          docker rm mlops-app || true
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest
          docker image prune -a -f
          docker run -d \
            --name mlops-app \
            --restart always \
            -p 8005:8005 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/mlops:latest
